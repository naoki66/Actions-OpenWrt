name: "构建LEDE-X64固件"

on:
  repository_dispatch:
      types: 
      - lede-group-update
  workflow_dispatch:
  # 已注释掉定期自动编译，仅在上游更新或手动触发时编译
  # schedule:
  #   - cron: '40 16 */7 * *'  # 每 7 天北京时间 00:40

env:
  # ───── 源码与脚本 ─────
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: config/lede/lede-x64.config
  DIY_P1_SH: scripts/lede/lede-diy-part1.sh
  DIY_P2_SH: scripts/lede/lede-diy-part2.sh

  # ───── 上传/发布选项 ─────
  UPLOAD_FIRMWARE: 'true'
  UPLOAD_RELEASE: 'true'

  # ───── 构建参数 ─────
  TZ: Asia/Shanghai
  DEBIAN_FRONTEND: noninteractive



jobs:
  build-firmware:
    name: 构建固件
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    concurrency:
      group: lede-x64-${{ github.ref }}  # 按分支隔离并发
      cancel-in-progress: true             # 取消旧任务，执行最新任务
    permissions:
      contents: write   # 允许推送构建产物到仓库
      actions: write    # 允许触发其他工作流

    steps:
    # 1️⃣ 检出仓库并记录开始时间
    - name: 检出仓库
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1

    - name: 记录开始时间
      run: |
        echo "TIME0=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_ENV"
        echo "RELEASE_TAG=$(date '+%Y.%m.%d-%H%M')" >> "$GITHUB_ENV"

    # 2️⃣ 准备构建环境
    - name: 准备构建环境
      env: { DEBIAN_FRONTEND: noninteractive }
      run: |
        sudo rm -rf /usr/share/{dotnet,man,doc,groff,info,lintian,linda,locale} \
                    /usr/local/lib/android /opt/ghc /usr/lib/jvm /usr/share/swift \
                    /usr/local/go /opt/hostedtoolcache/* /usr/share/az_*
        sudo docker system prune -af --volumes || true
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev


        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /mnt/workdir 
        sudo chown $USER:$GROUPS /mnt/workdir

    # 3️⃣ 克隆源码
    - name: 克隆源码
      working-directory: /mnt/workdir
      run: |
          df -hT $PWD
          git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL lede
          ln -sf $PWD/lede $GITHUB_WORKSPACE/lede


    # 4️⃣ 自定义 feeds，DIY_P1_SH
    - name: 应用自定义feeds和DIY_P1_SH
      run: |
        ## [ -e $FEEDS_CONF ] && mv $FEEDS_CONF lede/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd lede
        $GITHUB_WORKSPACE/$DIY_P1_SH


    # 5️⃣ 更新和安装 feeds
    - name: 更新和安装 feeds
      run: |
        cd lede
        ./scripts/feeds update -a
        ./scripts/feeds install -a -f


    # 7️⃣ 自定义配置config，DIY_P2_SH
    - name: 自定义配置config，DIY_P2_SH
      run: |
        [ -e "files/lede" ] && mv files/lede lede/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE lede/.config
        chmod +x $DIY_P2_SH
        cd lede
        $GITHUB_WORKSPACE/$DIY_P2_SH        


    # 7️⃣ 通过API生成上游一周更新日志
    - name: 通过API生成上游一周更新日志
      run: |
        echo "CHANGELOG_CONTENT<<EOF" > changelog_env.txt
        echo "-  🔧 [coolsnowwolf_lede主仓库](https://github.com/coolsnowwolf/lede)" >> changelog_env.txt
        curl -s "https://api.github.com/repos/coolsnowwolf/lede/commits?since=$(date -d '-7 days' --iso-8601=s)" \
          | jq -r '.[]? | select(.commit != null) | "- [\(.commit.committer.date)] \(.commit.message | split("\n")[0])"' >> changelog_env.txt 2>/dev/null || true
        echo "-  📦 [coolsnowwolf_packages](https://github.com/coolsnowwolf/packages)" >> changelog_env.txt
        curl -s "https://api.github.com/repos/coolsnowwolf/packages/commits?since=$(date -d '-7 days' --iso-8601=s)" \
          | jq -r '.[]? | select(.commit != null) | "- [\(.commit.committer.date)] \(.commit.message | split("\n")[0])"' >> changelog_env.txt 2>/dev/null || true
        echo "-  🖥️ [coolsnowwolf_luci](https://github.com/coolsnowwolf/luci)" >> changelog_env.txt
        curl -s "https://api.github.com/repos/coolsnowwolf/luci/commits?since=$(date -d '-7 days' --iso-8601=s)" \
          | jq -r '.[]? | select(.commit != null) | "- [\(.commit.committer.date)] \(.commit.message | split("\n")[0])"' >> changelog_env.txt 2>/dev/null || true
        echo "EOF" >> changelog_env.txt
        cat changelog_env.txt >> $GITHUB_ENV
        df -hT

    # 8️⃣ 下载源代码包
    - name: 下载源代码包
      id: package
      run: |
          cd lede
          make defconfig
          make download -j8
          # 清理不完整的下载文件
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
          df -hT
          # 显示下载目录大小
          du -sh dl
          # 进一步清理不必要的文件
          sudo rm -rf /tmp/* /var/tmp/*

          
    # 9️⃣ 编译固件
    - name: 编译固件
      id: compile
      run: |
          cd lede
          make V=s -j2 || make V=s -j1

    # 🔟 整理固件
    - name: 整理输出路径
      id: organize
      run: |
          cd lede/bin/targets/*/*
          rm -rf packages
          df -hT  
          echo "FIRMWARE_DIR=$PWD" >> $GITHUB_ENV
          echo "TIME1=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_ENV"

    # 1️⃣1️⃣ 计算编译耗时
    - name: 计算编译耗时
      run: |
        # 将 TIME0 和 TIME1 转换为 Unix 时间戳（秒）
        START_TIME=$(date -u -d "${{ env.TIME0 }}" +%s)
        END_TIME=$(date -u -d "${{ env.TIME1 }}" +%s)
        # 计算时间差（秒）
        ELAPSED_SECONDS=$((END_TIME - START_TIME))
        # 格式化为 HHh MMm SSs
        ELAPSED_FORMATTED=$(printf "%02dh %02dm %02ds" $((ELAPSED_SECONDS/3600)) $((ELAPSED_SECONDS%3600/60)) $((ELAPSED_SECONDS%60)))
        # 输出结果到环境变量
        echo "ELAPSED=$ELAPSED_FORMATTED" >> $GITHUB_ENV
        echo "::notice::总耗时: $ELAPSED"
        #检查固件目录内容
        ls -lh ${{ env.FIRMWARE_DIR }}

    # 1️⃣2️⃣ 上传固件产物
    - name: 上传固件产物
      if: env.UPLOAD_FIRMWARE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: LEDE_X64-${{ github.run_number }}
        path: ${{ env.FIRMWARE_DIR }}/*

    # 1️⃣3️⃣ 创建 GitHub 发布版本
    - name: 创建 GitHub 发布版本
      if: env.UPLOAD_RELEASE == 'true'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: LEDE-X64-${{ env.RELEASE_TAG }}
        name: LEDE-X64-${{ env.RELEASE_TAG }}
        body: |
          📦 **编译时间段**  
          ⏰ 从 **${{ env.TIME0 }}** 到 **${{ env.TIME1 }}**  
          🕒 **总耗时：${{ env.ELAPSED }}**
          🔄 **上游更新日志**  
             ${{ env.CHANGELOG_CONTENT || '无更新日志内容' }}
        files: ${{ env.FIRMWARE_DIR }}/*

    # 1️⃣4️⃣ 清理旧 Workflow 记录
    - name: 清理旧 Workflow 记录
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        retain_days: 3
        keep_minimum_runs: 3

    # 1️⃣5️⃣ 清理旧版本
    - name: 清理旧 Release
      if: env.UPLOAD_RELEASE == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_PREFIX: LEDE-X64-
        KEEP_LATEST: 8
      run: |
        gh release list --limit 100 --json tagName,createdAt \
          --jq '[.[] | select(.tagName | startswith(env.RELEASE_PREFIX))]
            | sort_by(.createdAt)
            | reverse
            | .[(env.KEEP_LATEST | tonumber):]
            | .[].tagName' |
        while read -r tag_name; do
          [ -z "$tag_name" ] && continue
          echo "Deleting release ${tag_name}"
          gh release delete "$tag_name" --cleanup-tag --yes
        done

    - name: 保存上游更新缓存
      if: github.event_name == 'repository_dispatch' && github.event.client_payload.commit_hash != ''
      run: |
        mkdir -p .cache/lede-group
        echo "${{ github.event.client_payload.commit_hash }}" > .cache/lede-group/last_commit

    - name: 缓存上游更新哈希
      if: github.event_name == 'repository_dispatch' && github.event.client_payload.commit_hash != ''
      continue-on-error: true
      uses: actions/cache/save@v4
      with:
        path: .cache/lede-group
        key: commit-lede-group-${{ github.event.client_payload.commit_hash }}
          
