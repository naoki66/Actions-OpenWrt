name: imagebuilder编译25.12.0
on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - Tag_updated
  schedule:
    - cron: "0 22 1,15 * *"  # 北京时间每月2日和16日06:00，约每2周

env:
  TZ: Asia/Shanghai
  BUILDINFO_URL: https://downloads.immortalwrt.org/releases/25.12.0/targets/x86/64/version.buildinfo
  BUILDINFO_CACHE_DIR: .cache/version-buildinfo/imagebuilder25.12.0-x64


jobs:
  build:
    if: github.event_name != 'repository_dispatch' || startsWith(github.event.client_payload.tag, 'v25.12.')
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    concurrency:
      group: imagebuilder-25.12.0-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write   # 允许推送构建产物到仓库
      actions: write    # 允许触发其他工作流

    steps:

    - name: 恢复 version.buildinfo 缓存
      uses: actions/cache/restore@v4
      with:
        path: ${{ env.BUILDINFO_CACHE_DIR }}
        key: version-buildinfo-imagebuilder25.12.0-x64-restore-${{ github.run_id }}
        restore-keys: |
          version-buildinfo-imagebuilder25.12.0-x64-

    - name: 获取 version.buildinfo 变化
      run: |
        mkdir -p "$BUILDINFO_CACHE_DIR"
        curl -fsSL "$BUILDINFO_URL" -o current-version.buildinfo
        if [ -f "$BUILDINFO_CACHE_DIR/version.buildinfo" ]; then
          if diff -u "$BUILDINFO_CACHE_DIR/version.buildinfo" current-version.buildinfo > version-buildinfo.diff; then
            echo "version.buildinfo 无变化" > version-buildinfo.diff
          fi
        else
          {
            echo "首次记录 version.buildinfo："
            cat current-version.buildinfo
          } > version-buildinfo.diff
        fi
        cp current-version.buildinfo "$BUILDINFO_CACHE_DIR/version.buildinfo"
        {
          echo "BUILDINFO_CHANGELOG<<EOF"
          cat version-buildinfo.diff
          echo "EOF"
        } >> "$GITHUB_ENV"

    - name: 删除文件
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo timedatectl set-timezone "$TZ"



    - name: 显示系统情况
      run: |
        lscpu
        free -h
        df -Th
        uname -a
        echo "TIME1=$(TZ=${TZ} date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    - name: 安装依赖文件
      run: |
        sudo -E apt-get update -qq
        sudo -E apt-get install -y -qq --no-install-recommends ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
        git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
        libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
        mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools \
        libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip zstd \
        vim wget xmlto xxd zlib1g-dev python3-setuptools
        sudo -E apt-get autoremove -y --purge
        sudo -E apt-get clean

    - name: 下载imagebuilder源码
      run: |
        wget https://downloads.immortalwrt.org/releases/25.12.0/targets/x86/64/immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64.tar.zst
        tar -I zstd -x -f immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64.tar.zst


    - name: 修改配置和编译文件
      run: |
        cd immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64
        sed -i 's/CONFIG_TARGET_ROOTFS_EXT4FS=y/#CONFIG_TARGET_ROOTFS_EXT4FS is not set/' .config
        sed -i 's/CONFIG_TARGET_EXT4_RESERVED_PCT=0/#CONFIG_TARGET_EXT4_RESERVED_PCT=0 is not set/' .config
        sed -i 's/CONFIG_TARGET_EXT4_BLOCKSIZE_4K=y/#CONFIG_TARGET_EXT4_BLOCKSIZE_4K is not set/' .config
        sed -i 's/CONFIG_TARGET_EXT4_BLOCKSIZE=4096/#CONFIG_TARGET_EXT4_BLOCKSIZE is not set/' .config
        sed -i 's/CONFIG_TARGET_EXT4_JOURNAL=y/#CONFIG_TARGET_EXT4_JOURNAL is not set/' .config
        sed -i 's/CONFIG_ISO_IMAGES=y/#CONFIG_ISO_IMAGES is not set/' .config
        sed -i 's/CONFIG_QCOW2_IMAGES=y/#CONFIG_QCOW2_IMAGES is not set/' .config
        sed -i 's/CONFIG_VDI_IMAGES=y/#CONFIG_VDI_IMAGES is not set/' .config
        sed -i 's/CONFIG_VMDK_IMAGES=y/#CONFIG_VMDK_IMAGES is not set/' .config
        sed -i 's/CONFIG_VHDX_IMAGES=y/#CONFIG_VHDX_IMAGES is not set/' .config
        sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=300/CONFIG_TARGET_ROOTFS_PARTSIZE=512/' .config
        sed -i 's/CONFIG_TARGET_PREINIT_IP="192.168.1.1"/CONFIG_TARGET_PREINIT_IP="192.168.50.1"/' .config
        sed -i 's/CONFIG_TARGET_PREINIT_BROADCAST="192.168.1.255"/CONFIG_TARGET_PREINIT_BROADCAST="192.168.50.255"/' .config

    - name: 添加非官方包
      run: |
        cd immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64
        #wget -P ./packages https://github.com/gdy666/luci-app-lucky/releases/download/v2.19.5/luci-app-lucky_2.2.2-r1_all.ipk
        #wget -P ./packages https://github.com/gdy666/luci-app-lucky/releases/download/v2.19.5/luci-i18n-lucky-zh-cn_25.051.13443.e78d498_all.ipk
        #wget -P ./packages https://github.com/gdy666/luci-app-lucky/releases/download/v2.19.5/lucky_2.19.5_Openwrt_x86_64.ipk
        #wget -P ./packages https://github.com/tty228/luci-app-wechatpush/releases/download/v3.6.10/luci-app-wechatpush_3.6.10_all.ipk
        #wget -P ./packages https://github.com/tty228/luci-app-wechatpush/releases/download/v3.6.10/luci-i18n-wechatpush-zh-cn_git-25.089.39732-ed90c03_all.ipk
        #wget -P ./packages https://github.com/Openwrt-Passwall/openwrt-passwall/releases/download/26.1.17-1/luci-i18n-passwall-zh-cn-26.1.17.apk
        #wget -P ./packages https://github.com/Openwrt-Passwall/openwrt-passwall/releases/download/26.1.17-1/luci-i18n-passwall-zh-cn-26.1.17.apk
        #wget -P ./packages https://github.com/Openwrt-Passwall/openwrt-passwall/releases/download/26.1.9-1/passwall_packages_apk_x86_64.zip
        #unzip ./packages/passwall_packages_apk_x86_64.zip -d ./packages/
        #wget -P ./packages https://github.com/sbwml/luci-app-mosdns/releases/download/v5.3.3-r5/openwrt-24.10-x86_64.tar.gz
        #tar --strip-components=1 -xzf ./packages/openwrt-24.10-x86_64.tar.gz -C ./packages/
        #wget -P ./packages https://github.com/stackia/rtp2httpd/releases/download/v3.7.0/luci-app-rtp2httpd-3.7.0-r1.apk
        #wget -P ./packages https://github.com/stackia/rtp2httpd/releases/download/v3.7.0/luci-i18n-rtp2httpd-zh-cn-3.7.0.apk
        #wget -P ./packages https://github.com/JasonYANG170/luci-app-wechatpush/releases/download/v25.12/luci-app-wechatpush-x86_64.zip
        #unzip ./packages/luci-app-wechatpush-x86_64.zip -d ./packages/
    - name: 编译
      id: compile
      run: |
        cd immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64
        #make image PACKAGES="qemu-ga pppoe-discovery bind-host luci-i18n-smartdns-zh-cn luci-i18n-package-manager-zh-cn luci-app-openclash luci-app-ddns-go luci-i18n-zerotier-zh-cn luci-i18n-ttyd-zh-cn luci-i18n-attendedsysupgrade-zh-cn luci-i18n-ddns-zh-cn ddns-scripts-dnspod luci-i18n-upnp-zh-cn luci-i18n-firewall-zh-cn luci-i18n-vlmcsd-zh-cn luci-i18n-arpbind-zh-cn luci-i18n-base-zh-cn luci-app-passwall luci-i18n-passwall-zh-cn ddns-scripts-cloudflare ddns-scripts_aliyun  luci-i18n-udpxy-zh-cn  luci-i18n-ddns-go-zh-cn luci-i18n-watchcat-zh-cn luci-app-wechatpush luci-i18n-wechatpush-zh-cn luci-i18n-wol-zh-cn  luci-proto-wireguard luci-i18n-dashboard-zh-cn luci-i18n-timewol-zh-cn kmod-nft-socket xray-core geoview  luci-i18n-uhttpd-zh-cn luci-i18n-rtp2httpd-zh-cn"
        make image PACKAGES="qemu-ga pppoe-discovery bind-host luci-i18n-smartdns-zh-cn luci-i18n-package-manager-zh-cn luci-app-openclash luci-app-ddns-go luci-i18n-zerotier-zh-cn luci-i18n-ttyd-zh-cn luci-i18n-attendedsysupgrade-zh-cn luci-i18n-ddns-zh-cn ddns-scripts-dnspod luci-i18n-upnp-zh-cn luci-i18n-firewall-zh-cn luci-i18n-vlmcsd-zh-cn luci-i18n-arpbind-zh-cn luci-i18n-base-zh-cn luci-app-passwall luci-i18n-passwall-zh-cn ddns-scripts-cloudflare ddns-scripts_aliyun  luci-i18n-udpxy-zh-cn  luci-i18n-ddns-go-zh-cn luci-i18n-watchcat-zh-cn  luci-i18n-wol-zh-cn  luci-proto-wireguard luci-i18n-dashboard-zh-cn luci-i18n-timewol-zh-cn kmod-nft-socket xray-core geoview  luci-i18n-uhttpd-zh-cn"
        echo "FILE_DATE=$(TZ=${TZ} date +"%Y%m%d-%H%M")" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理文件
      id: organize
      run: |
        cd immortalwrt-imagebuilder-25.12.0-x86-64.Linux-x86_64/bin/targets/*/*
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传firmware文件夹
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: imagebuilder-25.12.0-x64-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 创建 release 标签
      id: tag
      run: |
        echo "release_tag=imagebuilder25.12.0-x64-${{ env.FILE_DATE }}" >> $GITHUB_OUTPUT
        TIME2=$(TZ=${TZ} date '+%Y-%m-%d %H:%M:%S')
        START_TIME=$(TZ=${TZ} date -d "${TIME1}" +%s)
        END_TIME=$(TZ=${TZ} date -d "${TIME2}" +%s)
        ELAPSED_SECONDS=$((END_TIME - START_TIME))
        ELAPSED_FORMATTED=$(printf "%02dh %02dm %02ds" $((ELAPSED_SECONDS/3600)) $((ELAPSED_SECONDS%3600/60)) $((ELAPSED_SECONDS%60)))
        echo "TIME2=$TIME2" >> $GITHUB_ENV
        echo "ELAPSED=$ELAPSED_FORMATTED" >> $GITHUB_ENV
        {
          echo "📦 编译时间段"
          echo "⏰ 从 ${TIME1} 到 ${TIME2}"
          echo "🕒 总耗时：${ELAPSED_FORMATTED}"
          echo "🔄 上游更新日志"
          echo "version.buildinfo: ${BUILDINFO_URL}"
          echo
          echo "${BUILDINFO_CHANGELOG:-version.buildinfo 无变化}"
        } > release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传发布release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 缓存 version.buildinfo
      if: steps.tag.outputs.status == 'success' && !cancelled()
      continue-on-error: true
      uses: actions/cache/save@v4
      with:
        path: ${{ env.BUILDINFO_CACHE_DIR }}
        key: version-buildinfo-imagebuilder25.12.0-x64-${{ hashFiles('.cache/version-buildinfo/imagebuilder25.12.0-x64/version.buildinfo') }}

    - name: 删除运行的工作流
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        retain_days: 5
        keep_minimum_runs: 3

    - name: 删除旧 Releases
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_PREFIX: imagebuilder25.12.0-x64-
        KEEP_LATEST: 8
      run: |
        gh release list --limit 100 --json tagName,createdAt \
          --jq '[.[] | select(.tagName | startswith(env.RELEASE_PREFIX))]
            | sort_by(.createdAt)
            | reverse
            | .[(env.KEEP_LATEST | tonumber):]
            | .[].tagName' |
        while read -r tag_name; do
          [ -z "$tag_name" ] && continue
          echo "Deleting release ${tag_name}"
          gh release delete "$tag_name" --cleanup-tag --yes
        done



    - name: Pushplus推送通知
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: curl https://www.pushplus.plus/send -X POST -H "Content-Type:application/json" -d '{"title":"imagebuilder编译immortalwrt-25.12.0-64成功！","content":" 从${{ env.TIME1 }}开始到${{ env.TIME2 }}编译完成！","token":"${{ secrets.PUSHPLUS_TOKEN }}","webhook":"02","channel":"cp"}'
