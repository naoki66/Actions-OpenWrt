name: 检查上游commits更新并触发编译仓库

on:
  workflow_dispatch:
  schedule:
    - cron: '40 15 * * *'  # 中国时间每天23:40，给源码编译预留夜间窗口

jobs:
  check-repos:
    name: check-repos (${{ matrix.repo_group.id }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: update-checker-${{ matrix.repo_group.id }}
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: false
      matrix:
        repo_group:
          - id: immortalwrt-24-10-group
            repo_id: immortalwrt
            url: https://github.com/immortalwrt/immortalwrt
            branch: openwrt-24.10
          - id: immortalwrt-25-12-group
            repo_id: immortalwrt
            url: https://github.com/immortalwrt/immortalwrt
            branch: openwrt-25.12
          - id: lede-group
            repo_id: lede
            url: https://github.com/coolsnowwolf/lede
            branch: master

    steps:
    - name: 设置缓存目录路径
      id: vars
      run: |
        echo "cache_path=.cache/${{ matrix.repo_group.id }}" >> "$GITHUB_OUTPUT"
        echo "restore_key=commit-${{ matrix.repo_group.id }}-" >> "$GITHUB_OUTPUT"
        echo "restore_probe_key=commit-${{ matrix.repo_group.id }}-restore-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

    - name: 恢复上次缓存的提交哈希
      id: restore-cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.vars.outputs.cache_path }}
        key: ${{ steps.vars.outputs.restore_probe_key }}
        restore-keys: |
          ${{ steps.vars.outputs.restore_key }}

    - name: 检查 ${{ matrix.repo_group.id }} 更新
      id: check-update
      run: |
        # 只用主源码仓库判断是否触发编译，feeds 仓库仍在构建时更新并写入 release 日志。
        GROUP_HASH=$(git ls-remote "${{ matrix.repo_group.url }}" "${{ matrix.repo_group.branch }}" | cut -f1)
        if [[ -z "$GROUP_HASH" ]]; then
          echo "::error::无法获取 ${{ matrix.repo_group.repo_id }} 的 ${{ matrix.repo_group.branch }} 分支最新提交"
          exit 1
        fi
        echo "仓库 ${{ matrix.repo_group.repo_id }} 最新提交: $GROUP_HASH"
        echo "GROUP_HASH=$GROUP_HASH" >> $GITHUB_ENV  # 提供给触发器使用
        echo "cache_key=commit-${{ matrix.repo_group.id }}-$GROUP_HASH" >> "$GITHUB_OUTPUT"

        # 定位缓存文件
        CACHE_FILE="${{ steps.vars.outputs.cache_path }}/last_commit"
        mkdir -p "$(dirname "$CACHE_FILE")"

        # 在检查更新步骤中添加
        if [[ -f "$CACHE_FILE" ]]; then
          OLD_HASH=$(cat "$CACHE_FILE")
          echo "缓存中的旧哈希: $OLD_HASH"
          if [[ "$OLD_HASH" == "$GROUP_HASH" ]]; then
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "无新提交"
            exit 0
          fi
        fi

        echo "$GROUP_HASH" > "$CACHE_FILE"
        echo "has_update=true" >> "$GITHUB_OUTPUT"
        echo "检测到新提交！"

    - name: 触发构建
      if: steps.check-update.outputs.has_update == 'true'
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        event-type: ${{ matrix.repo_group.id }}-update
        client-payload: >-
          {
            "group_id": "${{ matrix.repo_group.id }}",
            "commit_hash": "${{ env.GROUP_HASH }}"
          }

    - name: 缓存已触发的提交哈希
      if: steps.check-update.outputs.has_update == 'true'
      continue-on-error: true
      uses: actions/cache/save@v5
      with:
        path: ${{ steps.vars.outputs.cache_path }}
        key: ${{ steps.check-update.outputs.cache_key }}

  cleanup:
    needs: check-repos
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
    - name: 删除旧工作流运行记录
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WORKFLOW_FILE: update-checker.yml
        RETAIN_DAYS: 3
        KEEP_MINIMUM_RUNS: 3
      run: |
        cutoff="$(date -u -d "-${RETAIN_DAYS} days" '+%Y-%m-%dT%H:%M:%SZ')"
        gh api --paginate "/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_FILE}/runs?per_page=100" \
          --jq '.workflow_runs[] | [.id, .created_at] | @tsv' |
        sort -k2r |
        awk -v keep="$KEEP_MINIMUM_RUNS" -v cutoff="$cutoff" 'NR > keep && $2 < cutoff { print $1 }' |
        while read -r run_id; do
          [ -z "$run_id" ] && continue
          [ "$run_id" = "${{ github.run_id }}" ] && continue
          echo "Deleting workflow run ${run_id}"
          gh api -X DELETE "/repos/${{ github.repository }}/actions/runs/${run_id}" || true
        done
