name: 检查上游commits更新并触发编译仓库

on:
  workflow_dispatch:
  schedule:
    - cron: '40 15 * * *'  # 中国时间每天23:40，给源码编译预留夜间窗口

jobs:
  check-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: update-checker-${{ matrix.repo_group.id }}
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: false
      matrix:
        repo_group:
          - id: immortalwrt-24-10-group
            repos:
              - id: immortalwrt
                url: https://github.com/immortalwrt/immortalwrt
                branch: openwrt-24.10
              - id: immortalwrt-packages
                url: https://github.com/immortalwrt/packages
                branch: openwrt-24.10
              - id: luci-packages
                url: https://github.com/immortalwrt/luci
                branch: openwrt-24.10
          - id: immortalwrt-25-12-group
            repos:
              - id: immortalwrt
                url: https://github.com/immortalwrt/immortalwrt
                branch: openwrt-25.12
              - id: immortalwrt-packages
                url: https://github.com/immortalwrt/packages
                branch: openwrt-25.12
              - id: luci-packages
                url: https://github.com/immortalwrt/luci
                branch: openwrt-25.12
          - id: lede-group
            repos:
              - id: lede
                url: https://github.com/coolsnowwolf/lede
                branch: master
              - id: lede-luci
                url: https://github.com/coolsnowwolf/luci
                branch: master
              - id: lede-packages
                url: https://github.com/coolsnowwolf/packages
                branch: master

    steps:
    - name: 设置缓存目录路径
      id: vars
      run: |
        echo "cache_path=.cache/${{ matrix.repo_group.id }}" >> "$GITHUB_OUTPUT"
        echo "restore_key=commit-${{ matrix.repo_group.id }}-" >> "$GITHUB_OUTPUT"
        echo "restore_probe_key=commit-${{ matrix.repo_group.id }}-restore-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

    - name: 恢复上次缓存的提交哈希
      id: restore-cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.vars.outputs.cache_path }}
        key: ${{ steps.vars.outputs.restore_probe_key }}
        restore-keys: ${{ steps.vars.outputs.restore_key }}

    - name: 检查 ${{ matrix.repo_group.id }} 更新
      id: check-update
      run: |
        GROUP_HASH=""
        for repo in $(echo '${{ toJson(matrix.repo_group.repos) }}' | jq -c '.[]'); do
          REPO_ID=$(echo $repo | jq -r '.id')
          REPO_URL=$(echo $repo | jq -r '.url')
          REPO_BRANCH=$(echo $repo | jq -r '.branch')
          # 直接获取最新 commit 哈希，避免完整克隆
          LATEST_HASH=$(git ls-remote $REPO_URL $REPO_BRANCH | cut -f1)
          if [[ -z "$LATEST_HASH" ]]; then
            echo "::error::无法获取 $REPO_ID 的 $REPO_BRANCH 分支最新提交"
            exit 1
          fi
          echo "仓库 $REPO_ID 最新提交: $LATEST_HASH"
          GROUP_HASH="$GROUP_HASH$LATEST_HASH"
        done
        GROUP_HASH=$(echo -n "$GROUP_HASH" | sha256sum | awk '{print $1}')
        echo "组 ${{ matrix.repo_group.id }} 组合哈希: $GROUP_HASH"
        echo "GROUP_HASH=$GROUP_HASH" >> $GITHUB_ENV  # 提供给触发器使用
        echo "cache_key=commit-${{ matrix.repo_group.id }}-$GROUP_HASH" >> "$GITHUB_OUTPUT"

        # 定位缓存文件
        CACHE_FILE="${{ steps.vars.outputs.cache_path }}/last_commit"
        mkdir -p "$(dirname "$CACHE_FILE")"

        # 在检查更新步骤中添加
        if [[ -f "$CACHE_FILE" ]]; then
          OLD_HASH=$(cat "$CACHE_FILE")
          echo "缓存中的旧哈希: $OLD_HASH"
          if [[ "$OLD_HASH" == "$GROUP_HASH" ]]; then
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "无新提交"
            exit 0
          fi
        fi

        # 有更新，缓存由被触发的构建工作流在成功后写入
        echo "has_update=true" >> "$GITHUB_OUTPUT"
        echo "检测到新提交！"

    - name: 触发构建
      if: steps.check-update.outputs.has_update == 'true'
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        event-type: ${{ matrix.repo_group.id }}-update
        client-payload: >-
          {
            "group_id": "${{ matrix.repo_group.id }}",
            "commit_hash": "${{ env.GROUP_HASH }}"
          }

    - name: 删除旧工作流运行记录
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 3
        keep_minimum_runs: 3
